<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Student Directory</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#eef5ff;
    font-family:Arial, sans-serif;
}

h2{
    color:#0d6efd;
    font-weight:bold;
}

.search-box{
    max-width:500px;
    margin:auto;
}

.card{
    border:none;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 6px 15px rgba(0,0,0,0.15);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    height:250px;
    object-fit:cover;
}

.card-body{
    text-align:center;
}

.cgpa{
    display:none;
    color:green;
    font-weight:bold;
}

.btn{
    border-radius:20px;
}

</style>

</head>

<body>

<div class="container py-5">

<h2 class="text-center mb-4">
Student Directory
</h2>

<div class="search-box mb-5">

<input
type="text"
id="search"
class="form-control"
placeholder="Search by Name, Roll No or CGPA">

</div>

<div class="row g-4">

<!-- Student 1 -->

<div class="col-lg-4 col-md-6 student-card"
data-name="Rahul Sharma"
data-roll="101"
data-cgpa="8.5">

<div class="card h-100">

<img src="images/student1.jpg" alt="Rahul">

<div class="card-body">

<h4>Rahul Sharma</h4>

<p><strong>Roll No:</strong> 101</p>

<p class="cgpa">
CGPA : 8.5
</p>

<button class="btn btn-primary showBtn">
Show CGPA
</button>

</div>

</div>

</div>


<div class="col-lg-4 col-md-6 student-card"
data-name="Priya Singh"
data-roll="102"
data-cgpa="9.1">

<div class="card h-100">

<img src="images/student2.jpg" alt="Priya">

<div class="card-body">

<h4>Priya Singh</h4>

<p><strong>Roll No:</strong>102</p>

<p class="cgpa">
CGPA : 9.1
</p>

<button class="btn btn-primary showBtn">
Show CGPA
</button>

</div>

</div>

</div>



<div class="col-lg-4 col-md-6 student-card"
data-name="Aman Gupta"
data-roll="103"
data-cgpa="8.5">

<div class="card h-100">

<img src="images/student3.jpg" alt="Aman">

<div class="card-body">

<h4>Aman Gupta</h4>

<p><strong>Roll No:</strong>103</p>

<p class="cgpa">
CGPA : 8.5
</p>

<button class="btn btn-primary showBtn">
Show CGPA
</button>

</div>

</div>

</div>


<div class="col-lg-4 col-md-6 student-card"
data-name="Sneha Verma"
data-roll="104"
data-cgpa="9.4">

<div class="card h-100">

<img src="images/student4.jpg" alt="Sneha">

<div class="card-body">

<h4>Sneha Verma</h4>

<p><strong>Roll No:</strong>104</p>

<p class="cgpa">
CGPA : 9.4
</p>

<button class="btn btn-primary showBtn">
Show CGPA
</button>

</div>

</div>

</div>


<div class="col-lg-4 col-md-6 student-card"
data-name="Karan Mehta"
data-roll="105"
data-cgpa="8.9">

<div class="card h-100">

<img src="images/student5.jpg" alt="Karan">

<div class="card-body">

<h4>Karan Mehta</h4>

<p><strong>Roll No:</strong>105</p>

<p class="cgpa">
CGPA : 8.9
</p>

<button class="btn btn-primary showBtn">
Show CGPA
</button>

</div>

</div>

</div>

</div>

</div>

<!-- jQuery -->

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script>

$(document).ready(function(){

// Show / Hide CGPA

$(".showBtn").click(function(){

$(this).siblings(".cgpa").slideToggle();

if($(this).text()=="Show CGPA"){
    $(this).text("Hide CGPA");
}
else{
    $(this).text("Show CGPA");
}

});



$("#search").keyup(function(){

let value=$(this).val().toLowerCase().trim();

$(".student-card").each(function(){

let name=$(this).data("name").toLowerCase();
let roll=$(this).data("roll").toString();
let cgpa=$(this).data("cgpa").toString();

if(name.includes(value) ||
roll.includes(value) ||
cgpa.includes(value))
{
$(this).show();
}
else
{
$(this).hide();
}

});

});

});

</script>

</body>
</html>
